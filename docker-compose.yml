version: '3.9'

# ─── Local Development Infrastructure ────────────────────────────────────────
# Database: Neon (cloud) — set DATABASE_URL in .env
# Redis + Kafka run locally via this compose file
#
# Start:   docker-compose up -d
# Stop:    docker-compose down

services:
  redis:
    image: redis:7-alpine
    container_name: mediflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mediflow-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: mediflow_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD-SHELL', 'echo ruok | nc -w 2 localhost 2181 | grep imok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mediflow-network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: mediflow_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test:
        ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - mediflow-network

volumes:
  redis_data:
    driver: local

networks:
  mediflow-network:
    driver: bridge
    name: mediflow-network
