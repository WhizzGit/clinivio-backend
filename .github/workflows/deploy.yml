name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  # ── Gate 1: Unit tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/test
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
        run: pnpm test

  # ── Gate 2: Integration / E2E tests (Neon test branch) ─────────────────────
  integration-tests:
    name: Integration Tests (Neon test branch)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Skip gracefully if DATABASE_URL_TEST secret is not configured yet.
    # Once you create the Neon test branch, add the secret and remove this condition.
    if: ${{ vars.INTEGRATION_TESTS_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E tests against Neon test branch
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          REDIS_URL: ${{ secrets.REDIS_URL_TEST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          TEST_TENANT_SLUG: ${{ vars.TEST_TENANT_SLUG }}
        run: pnpm test:e2e

  # ── Deploy: Backend → Render.com ────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [unit-tests]       # also add integration-tests once enabled
    environment: production
    steps:
      - name: Trigger Render deploy hook
        # Add RENDER_DEPLOY_HOOK_URL secret in GitHub Settings → Secrets.
        # Get the URL from: Render dashboard → clinivio-api → Settings → Deploy Hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --retry 3 --retry-delay 5
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for Render health check
        # Polls /health until 200 or times out after 3 minutes.
        run: |
          echo "Waiting for backend to come up..."
          for i in $(seq 1 18); do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${{ vars.API_HEALTH_URL }}/health" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Backend did not become healthy in time."
          exit 1

  # ── Deploy: Frontend → Vercel ───────────────────────────────────────────────
  # Vercel auto-deploys on push to main via its GitHub integration.
  # This job exists only to notify Vercel to promote the preview to production
  # AFTER the backend is confirmed healthy — preventing frontend→backend version skew.
  deploy-frontend:
    name: Notify Frontend Deploy (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Trigger Vercel production deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            --retry 3 --retry-delay 5
