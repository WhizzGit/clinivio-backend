# render.yaml — Render Blueprint for Clinivio Backend
# Docs: https://render.com/docs/blueprint-spec
#
# Single unified NestJS API service — all former microservices merged into one.
# One Docker build, one endpoint, one Redis instance.
#
# One-time setup after first deploy:
#   1. Set DATABASE_URL to your Neon pooler URL in the Render dashboard
#      (e.g. postgres://user:pass@ep-xxxx-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require)
#   2. Set JWT_SECRET, JWT_REFRESH_SECRET to secure random strings
#   3. Optionally set KAFKA_BROKERS (Upstash), WHATSAPP_*, RAZORPAY_*, MSG91_*

services:
  # ─── Redis (Bull queues + session cache) ────────────────────────────────────
  - type: redis
    name: clinivio-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []           # private — only accessible to Render services

  # ─── Unified API ────────────────────────────────────────────────────────────
  - type: web
    name: clinivio-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      # ── Server ──────────────────────────────────────────────────────────────
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

      # ── Database (Neon) ──────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false           # Set manually: Neon pooler URL

      # ── Redis ────────────────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: clinivio-redis
          property: connectionString

      # ── JWT ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # ── Kafka (optional — Upstash) ───────────────────────────────────────────
      - key: KAFKA_BROKERS
        sync: false
      - key: KAFKA_SASL_USERNAME
        sync: false
      - key: KAFKA_SASL_PASSWORD
        sync: false
      - key: KAFKA_SSL
        value: 'true'
      - key: KAFKA_CLIENT_ID
        value: clinivio-api
      - key: KAFKA_GROUP_ID
        value: clinivio-api-group

      # ── WhatsApp Business ────────────────────────────────────────────────────
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false

      # ── Razorpay (optional) ───────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── SMS / MSG91 (optional) ────────────────────────────────────────────────
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_SENDER_ID
        value: CLNVIO

      # ── Rate limiting ─────────────────────────────────────────────────────────
      - key: THROTTLE_TTL
        value: '60000'
      - key: THROTTLE_LIMIT
        value: '120'

      # ── GST rates ─────────────────────────────────────────────────────────────
      - key: GST_CGST_RATE
        value: '0.09'
      - key: GST_SGST_RATE
        value: '0.09'
      - key: GST_IGST_RATE
        value: '0.18'
