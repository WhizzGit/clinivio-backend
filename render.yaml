# render.yaml — Render Blueprint for MediFlow Backend
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy all 6 NestJS services + Redis with one click.
# Each service is built from its Dockerfile in the monorepo.
#
# One-time setup after first deploy:
#   1. Set DATABASE_URL in each service's Render env vars dashboard
#      (use Neon pooler URL: ep-xxxx-pooler.c-8.us-east-1.aws.neon.tech)
#   2. Set KAFKA_BROKERS to your Upstash Kafka bootstrap server
#   3. Set JWT_SECRET, JWT_REFRESH_SECRET (same value across all services)

services:
  # ─── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: mediflow-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []                    # private — only accessible to Render services

  # ─── IAM Service (Auth + Tenants) ───────────────────────────────────────────
  - type: web
    name: mediflow-iam-service
    runtime: docker
    dockerfilePath: ./apps/iam-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false                    # Set manually in Render dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: mediflow-redis
          property: connectionString
      - key: KAFKA_BROKERS
        sync: false                    # Upstash Kafka bootstrap URL
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

  # ─── Patient Service ────────────────────────────────────────────────────────
  - type: web
    name: mediflow-patient-service
    runtime: docker
    dockerfilePath: ./apps/patient-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: mediflow-redis
          property: connectionString
      - key: KAFKA_BROKERS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

  # ─── Appointment Service (OPD, IPD, Lab, Pharmacy, Stats) ──────────────────
  - type: web
    name: mediflow-appointment-service
    runtime: docker
    dockerfilePath: ./apps/appointment-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: mediflow-redis
          property: connectionString
      - key: KAFKA_BROKERS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

  # ─── Billing Service ────────────────────────────────────────────────────────
  - type: web
    name: mediflow-billing-service
    runtime: docker
    dockerfilePath: ./apps/billing-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: mediflow-redis
          property: connectionString
      - key: KAFKA_BROKERS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # ─── Notification Service ───────────────────────────────────────────────────
  - type: web
    name: mediflow-notification-service
    runtime: docker
    dockerfilePath: ./apps/notification-service/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: mediflow-redis
          property: connectionString
      - key: KAFKA_BROKERS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_SENDER_ID
        value: MEDFLW

  # ─── WhatsApp Engine ────────────────────────────────────────────────────────
  - type: web
    name: mediflow-whatsapp-engine
    runtime: docker
    dockerfilePath: ./apps/whatsapp-engine/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: mediflow-redis
          property: connectionString
      - key: KAFKA_BROKERS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
